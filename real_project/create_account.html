<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link rel="stylesheet" href="./create_account.css">
<body>
        <div class="header">
            <img src="./ChatGPT Image Oct 10, 2025, 11_58_14 AM.png " width="190px" height="120px" style="margin-left: 20px;">
       
        </div>
            <div class="container">
                 <div class="Create">
                     <h4>Create Account</h4>
                      <br>
                        <i class="fa-solid fa-user"></i>
                        <input type="text" class="inputs" placeholder="Enter your username">
                        <br>
                        <br>
                        <i class="fa fa-envelope"></i>
                       <input type="email" class="inputs" placeholder="Enter your email"> 
                       <br>
                       <br>
                       <i class="fa fa-lock"></i>
                       <input type="password" class="inputs" id="signupPassword" placeholder="Enter your password">
                       <!-- Password Strength Meter -->
                       <div id="strengthMeter" style="width: 220px; margin: 8px auto;">
                           <div id="strengthBar" style="height: 5px; width: 0%; border-radius: 3px; transition: all 0.3s ease;"></div>
                       </div>
                       <p id="strengthText" style="font-size: 11px; margin-bottom: 5px; height: 14px;"></p>
                       <br>
                       <i class="fa-solid fa-key"></i>
                       <input type="password" class="inputs" placeholder="Confirm your password">
                         <br>
                         <br>
                       <button>Sign up</button>
                       <br>
                       <br>
                       <a href="login.html">Already have an account <span>Log in</span></a>
                 </div>
            </div>
            <script src="cryptography.js"></script>
            <script src="./create_account.js" defer></script>
</body>
</html>
