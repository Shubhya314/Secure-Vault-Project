<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<body>
        <div class="header">
            <img src="./ChatGPT Image Oct 10, 2025, 11_58_14 AM.png " width="190px" height="120px" style="margin-left: 20px;">
       
        </div>
            <div class="container">
                 <div class="Create">
                     <h4>Create Account</h4>
                      <br>
                        <i class="fa-solid fa-user"></i>
                        <input type="text" class="inputs" placeholder="Enter your username">
                        <br>
                        <br>
                        <i class="fa fa-envelope"></i>
                       <input type="email" class="inputs" placeholder="Enter your email"> 
                       <br>
                       <br>
                       <i class="fa fa-lock"></i>
                       <input type="password" class="inputs" placeholder="Enter your password">
                       <br>
                       <br>
                       <i class="fa-solid fa-key"></i>
                       <input type="password" class="inputs" placeholder="Confirm your password">
                         <br>
                         <br>
                       <button>Sign up</button>
                       <br>
                       <br>
                       <a href="">Already have an account <span>Log in</span></a>
                 </div>
            </div>
            <script src="cryptography.js"></script>
            <script src="./create_account.js" defer></script>
